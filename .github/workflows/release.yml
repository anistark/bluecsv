name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build bluecsv-ls
        working-directory: server
        run: cargo build --release --bin bluecsv-ls --target ${{ matrix.target }}
      - name: Package
        working-directory: server
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/bluecsv-ls dist/
          tar -czf dist/bluecsv-ls-${{ matrix.target }}.tar.gz -C dist bluecsv-ls
      - uses: actions/upload-artifact@v4
        with:
          name: bluecsv-ls-${{ matrix.target }}
          path: server/dist/bluecsv-ls-${{ matrix.target }}.tar.gz

  publish:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Read tag annotation
        id: tag
        run: |
          subject=$(git for-each-ref --format='%(contents:subject)' "refs/tags/${GITHUB_REF_NAME}")
          echo "tag ${GITHUB_REF_NAME} subject: [${subject}]"
          echo "subject=${subject:-${GITHUB_REF_NAME}}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          name: ${{ steps.tag.outputs.subject }}
          generate_release_notes: true
